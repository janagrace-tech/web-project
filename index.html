<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>A Special Page For You ❤️</title>
    <style>
        body {
            background-color: #fce3ef; /* Lavender Blush (Soft Valentine Pink) */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 40px 20px;
            color: #4a4a4a;
        }
        .heart-header {
            font-size: 3rem;
            margin-bottom: 10px;
            animation: heartbeat 1.5s infinite;
        }
        h1 {
            color: #d14949; /* Soft red/rose color */
            margin-top: 0;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
        }
        ul {
            list-style-type: none;
            padding: 0;
            max-width: 350px;
            margin: 20px auto;
        }
        li {
            background: white;
            margin: 12px 0;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(209, 73, 73, 0.1);
            border-left: 5px solid #ffb6c1; /* Light pink accent line */
            font-weight: 500;
        }
        .footer-love {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #9b9b9b;
        }
        /* This makes the top heart gently pulse like a heartbeat! */
        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="heart-header">❤️</div>
    <h1>Hello Hanii!</h1>
    <p>Specially made for my Baba!:</p>

    <ul>
        <li>✨ I Miss Youu my Babuuu. Can't wait to see youu!</li>
        <li>🥰 I appreciate everything you do love.</li>
        <li>💖 I LOVE YOUUUUU🥰 </li>
    </ul>

    <p style="margin-top: 30px; font-weight: bold; color: #d14949;">
        Sending you the biggest hug through this screen! 🧸
    </p>

    <div class="footer-love">
        Made with Love & Code by yours truly babyyy
    </div>

</body>
</html>
