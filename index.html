<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- This magical line below fixes the mobile zoom issue! -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Page For You ❤️</title>
    <style>
        body {
            background-color: #fff0f5; /* Lavender Blush */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 30px 15px;
            color: #4a4a4a;
        }
        .heart-header {
            font-size: 3.5rem; /* Made the heart bigger */
            margin-bottom: 5px;
            animation: heartbeat 1.5s infinite;
        }
        h1 {
            color: #d14949;
            font-size: 2.2rem; /* Bigger title */
            margin-top: 0;
            margin-bottom: 5px;
        }
        .subtitle {
            font-size: 1.1rem;
            margin-bottom: 25px;
            color: #7a7a7a;
        }
        ul {
            list-style-type: none;
            padding: 0;
            width: 90%; /* Adapts perfectly to phone screens */
            max-width: 380px; 
            margin: 20px auto;
        }
        li {
            background: white;
            margin: 15px 0;
            padding: 18px 15px; /* Added more breathing room inside the cards */
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(209, 73, 73, 0.12);
            border-left: 6px solid #ffb6c1;
            font-weight: 500;
            font-size: 1.1rem; /* Bigger, easier-to-read text */
        }
        .hug-text {
            margin-top: 35px; 
            font-weight: bold; 
            color: #d14949;
            font-size: 1.2rem;
            padding: 0 10px;
        }
        .footer-love {
            margin-top: 50px;
            font-size: 0.95rem;
            color: #9b9b9b;
        }
        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="heart-header">❤️</div>
    <h1>Hello Hanii!</h1>
    <div class="subtitle">Specially made for my Baba!:</div>

    <ul>
        <li>✨ I Miss Youu my Babuuu. Can't wait to see youu!</li>
        <li>🥰 I appreciate everything you do love.</li>
        <li>💖 I LOVE YOUUUUU🥰</li>
    </ul>

    <p class="hug-text">
        Sending you the biggest hug through this screen! 🧸
    </p>

    <div class="footer-love">
        Made with Love & Code by yours truly babyyy
    </div>

</body>
</html>
