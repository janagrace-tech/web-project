<!DOCTYPE html>
<html lang="en">
<head>

    <title>My First Web Project</title>
    <style>
        /* This is CSS! It styles your page */
        body {
            background-color: #f0f8ff; /* Alice Blue background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;       /* Centers all your text */
            padding: 40px;
        }
        h1 {
            color: #2c3e50;           /* Dark slate color for the title */
        }
        ul {
            list-style-type: none;    /* Removes ugly bullet points */
            padding: 0;
        }
        li {
            background: white;
            margin: 10px auto;
            padding: 10px;
            width: 300px;
            border-radius: 8px;       /* Rounds the corners */
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); /* Adds a soft shadow */
        }
        a {
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline; /* Underlines link when you hover */
        }
    </style>
</head>
<body>

    </ul>
